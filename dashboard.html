<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>VitaPharm | الصيدلية الذكية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&family=Playfair+Display:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #0f6e4a;
            --primary-dark: #0a5137;
            --primary-light: #e8f5e9;
            --secondary: #2c7da0;
            --accent: #f4a261;
            --danger: #e76f51;
            --success: #2a9d8f;
            --dark: #2d3e50;
            --gray: #6c757d;
            --light: #f8f9fa;
            --white: #ffffff;
            --border: #e9ecef;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.08);
            --radius: 20px;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: #f0f2f5;
            color: var(--dark);
            line-height: 1.6;
        }

        body.english {
            direction: ltr;
            text-align: left;
        }

        .navbar {
            background: var(--white);
            padding: 1.2rem 2.5rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo-vitapharm .brand-name {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 800;
            color: #0a5c3e;
        }

        .logo-vitapharm .brand-sub {
            font-size: 0.8rem;
            color: #4a6a5e;
        }

        .nav-links {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        .nav-btn {
            background: transparent;
            border: none;
            padding: 12px 28px;
            border-radius: 60px;
            cursor: pointer;
            font-weight: 700;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
            color: var(--gray);
        }

        .nav-btn.active,
        .nav-btn:hover {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
        }

        .role-switch-container {
            position: relative;
        }

        .role-switch-btn {
            background: linear-gradient(135deg, #f8f9fa, #ffffff);
            border: 1px solid var(--border);
            padding: 10px 24px 10px 40px;
            border-radius: 60px;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .role-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
            display: none;
            z-index: 100;
        }

        .role-dropdown.show {
            display: block;
        }

        .role-option {
            padding: 12px 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid var(--border);
        }

        .role-option:hover {
            background: var(--primary-light);
        }

        .lang-switch {
            background: linear-gradient(135deg, #f8f9fa, #ffffff);
            border: 1px solid var(--border);
            padding: 10px 20px;
            border-radius: 60px;
            cursor: pointer;
        }

        .lang-switch:hover {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
        }

        .main-content {
            padding: 2rem 2.5rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .brand-showcase {
            background: linear-gradient(135deg, #fef9e6, #fff5e0);
            border-radius: 50px;
            padding: 2.5rem 3rem;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 2rem;
        }

        .brand-center {
            text-align: center;
        }

        .brand-center .logo-icon {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            width: 100px;
            height: 100px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 0.8rem;
        }

        .brand-center .logo-icon i {
            font-size: 3rem;
            color: white;
        }

        .brand-center .brand-name {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--primary);
        }

        .brand-icons {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 0.8rem;
        }

        .brand-icons .icon-circle {
            background: white;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
        }

        .brand-icons .icon-circle i {
            font-size: 1.6rem;
            color: var(--primary);
        }

        .hero-section {
            background: linear-gradient(135deg, #0a5c3e, #1e7a55);
            border-radius: 50px;
            padding: 2.5rem;
            margin-bottom: 2rem;
            text-align: center;
            color: white;
        }

        .hero-section h2 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .hero-section p {
            font-size: 1.1rem;
        }

        .search-section {
            display: flex;
            justify-content: center;
            margin-bottom: 2.5rem;
        }

        .search-container {
            position: relative;
            width: 100%;
            max-width: 600px;
        }

        .search-bar {
            display: flex;
            gap: 12px;
            background: white;
            padding: 12px 24px;
            border-radius: 70px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.1);
            border: 1px solid var(--border);
        }

        .search-bar input {
            flex: 1;
            border: none;
            padding: 14px 12px;
            font-size: 1.1rem;
            outline: none;
            background: transparent;
        }

        .search-bar button {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            border-radius: 60px;
            padding: 0 32px;
            cursor: pointer;
            font-weight: 600;
        }

        .suggestions-list {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border-radius: 25px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
            max-height: 280px;
            overflow-y: auto;
            display: none;
            z-index: 100;
        }

        .suggestion-item {
            padding: 14px 20px;
            cursor: pointer;
            border-bottom: 1px solid var(--border);
        }

        .suggestion-item:hover {
            background: var(--primary-light);
        }

        .categories-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2rem;
            margin-bottom: 3rem;
        }

        .category-icon-card {
            background: white;
            border-radius: 28px;
            padding: 2rem 1rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        .category-icon-card:hover {
            transform: translateY(-8px);
            border-color: var(--primary);
        }

        .category-icon-card .category-img {
            width: 100px;
            height: 100px;
            margin: 0 auto 1rem;
            border-radius: 50%;
            overflow: hidden;
            background: var(--primary-light);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .category-icon-card .category-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        .category-icon-card .category-img i {
            font-size: 3rem;
            color: var(--primary);
        }

        .category-icon-card h3 {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .category-icon-card p {
            font-size: 0.9rem;
            color: var(--gray);
        }

        .slider-wrapper {
            margin-bottom: 2rem;
        }

        .slider-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .slider-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--primary);
        }

        .slider-container {
            position: relative;
            display: flex;
            align-items: center;
        }

        .slider-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: white;
            border: 1px solid var(--border);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .slider-arrow-left {
            left: -20px;
        }

        .slider-arrow-right {
            right: -20px;
        }

        .slider-arrow:hover {
            background: var(--primary);
            color: white;
        }

        .products-scroll {
            display: flex;
            overflow-x: auto;
            gap: 1.2rem;
            padding: 0.5rem 0.2rem 1rem;
            scroll-behavior: smooth;
        }

        .product-card {
            min-width: 260px;
            max-width: 260px;
            background: white;
            border-radius: 20px;
            padding: 1rem;
            text-align: center;
            border: 1px solid var(--border);
            transition: all 0.3s;
        }

        .product-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(0, 0, 0, 0.1);
        }

        .product-img {
            background: #f8f9fa;
            height: 110px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 0.8rem;
        }

        .product-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 16px;
        }

        .product-img i {
            font-size: 2.2rem;
            color: var(--primary);
        }

        .product-card h3 {
            font-size: 0.95rem;
            font-weight: 700;
            margin: 0.5rem 0;
            color: var(--dark);
        }

        .product-stock {
            font-size: 0.7rem;
            color: var(--gray);
            margin-bottom: 0.5rem;
        }

        .badge {
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.65rem;
            font-weight: 700;
            display: inline-block;
        }

        .badge-prescription {
            background: #fff3cd;
            color: #b87c00;
        }

        .badge-otc {
            background: #d4edda;
            color: #155724;
        }

        .product-price {
            font-size: 1rem;
            font-weight: 800;
            color: var(--primary);
            margin: 0.5rem 0;
        }

        .btn-cart {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.8rem;
            width: 100%;
            margin-top: 8px;
            transition: all 0.2s;
        }

        .btn-cart:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 12px rgba(15, 110, 74, 0.3);
        }

        .category-hero {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 40px;
            padding: 2rem;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 2rem;
            color: white;
        }

        .category-hero .cat-hero-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .category-hero .cat-hero-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        .category-hero .cat-hero-img i {
            font-size: 3rem;
            color: var(--primary);
        }

        .category-hero h2 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .orders-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .orders-header h2 {
            font-size: 2rem;
            color: var(--primary);
        }

        .orders-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1.5rem;
        }

        .order-card {
            background: white;
            border-radius: 24px;
            padding: 1.5rem;
            border: 1px solid var(--border);
            transition: all 0.3s;
        }

        .order-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow);
        }

        .purchased-meds {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-top: 1rem;
        }

        .med-badge {
            background: linear-gradient(135deg, #d4edda, #c3e6cb);
            color: #155724;
            padding: 12px 20px;
            border-radius: 50px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
        }

        .payment-methods {
            display: flex;
            gap: 1rem;
            margin: 1.5rem 0;
            flex-wrap: wrap;
        }

        .payment-btn {
            background: var(--light);
            border: 2px solid var(--border);
            padding: 12px 24px;
            border-radius: 60px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .payment-btn:hover,
        .payment-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .payment-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10001;
        }

        .payment-card {
            background: white;
            border-radius: 40px;
            padding: 2rem;
            width: 90%;
            max-width: 450px;
        }

        .payment-card input,
        .payment-card select {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid var(--border);
            border-radius: 50px;
            font-size: 1rem;
        }

        .prescription-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10002;
        }

        .prescription-card {
            background: white;
            border-radius: 40px;
            padding: 2rem;
            width: 90%;
            max-width: 450px;
        }

        .back-btn {
            background: var(--light);
            border: 1px solid var(--border);
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 1rem;
        }

        .stat-card {
            background: white;
            border-radius: 20px;
            padding: 1.2rem;
            margin-bottom: 1rem;
        }

        .cart-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 16px;
            overflow: hidden;
        }

        .cart-table th,
        .cart-table td {
            padding: 12px;
            text-align: right;
            border-bottom: 1px solid var(--border);
        }

        .cart-table th {
            background: var(--primary-light);
            color: var(--primary);
        }

        .admin-stats {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .admin-stat {
            background: white;
            border-radius: 20px;
            padding: 1rem;
            text-align: center;
            cursor: pointer;
            border: 1px solid var(--border);
        }

        .admin-stat:hover {
            transform: translateY(-3px);
            border-color: var(--primary);
        }

        .admin-stat i {
            font-size: 1.8rem;
            color: var(--primary);
        }

        .admin-stat .value {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary);
        }

        .chart-container {
            background: white;
            border-radius: 20px;
            padding: 1rem;
            margin-bottom: 1.5rem;
        }

        .btn-add-large {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 15px;
            border-radius: 60px;
            width: 100%;
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 2rem;
            cursor: pointer;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }

        .modal-content {
            background: white;
            padding: 1.8rem;
            border-radius: 28px;
            width: 90%;
            max-width: 420px;
        }

        .modal-content input,
        .modal-content select {
            width: 100%;
            margin: 8px 0;
            padding: 10px 16px;
            border: 1px solid var(--border);
            border-radius: 40px;
            font-size: 1rem;
            font-family: 'Cairo', sans-serif;
        }

        .modal-content .tab-bar {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.2rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.8rem;
        }

        .modal-content .tab {
            cursor: pointer;
            font-weight: 700;
            padding: 6px 0;
            color: var(--gray);
            border-bottom: 2px solid transparent;
        }

        .modal-content .tab.active {
            color: var(--primary);
            border-bottom: 2px solid var(--primary);
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: white;
            padding: 10px 20px;
            border-radius: 50px;
            box-shadow: var(--shadow);
            z-index: 2000;
            border-right: 4px solid var(--primary);
        }

        .data-table {
            width: 100%;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            margin-top: 1rem;
        }

        .data-table th,
        .data-table td {
            padding: 12px;
            text-align: right;
            border-bottom: 1px solid var(--border);
        }

        .data-table th {
            background: var(--primary-light);
            color: var(--primary);
        }

        .loading {
            text-align: center;
            padding: 3rem;
            color: var(--gray);
            font-size: 1.2rem;
        }

        .error-msg {
            background: #fff3cd;
            border: 1px solid #ffc107;
            padding: 1rem;
            border-radius: 16px;
            margin-bottom: 1rem;
            color: #856404;
        }

        @media (max-width: 900px) {
            .categories-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .brand-showcase {
                flex-direction: column;
            }

            .admin-stats {
                grid-template-columns: repeat(3, 1fr);
            }

            .main-content {
                padding: 1rem;
            }
        }
    </style>
</head>

<body>
    <div class="navbar">
        <div class="logo-vitapharm">
            <div class="brand-name">VitaPharm</div>
            <div class="brand-sub">ONLINE PHARMACY | Caring for your health from home</div>
        </div>
        <div class="nav-links" id="navLinks"></div>
        <div style="display: flex; gap: 12px; align-items: center;">

                    id="langText">العربية</span></button>
            <div class="role-switch-container">
                <div class="role-switch-btn" id="roleDisplay" style="cursor:default;">
                    <i class="fas fa-user" id="roleIcon"></i>
                    <span id="roleText">زائر</span>
                </div>
            </div>
            <button id="authBtn" class="nav-btn"><i class="fas fa-sign-in-alt"></i> <span
                    id="authBtnText">دخول</span></button>
        </div>
    </div>
    <div class="main-content" id="mainContent"></div>
    <footer style="text-align: center; padding: 1.5rem; color: var(--gray); border-top: 1px solid var(--border);">
        <div>VitaPharm | ONLINE PHARMACY | Caring for your health from home</div>
        <small>© 2025 VitaPharm. All rights reserved.</small>
    </footer>

        // ===================== API HELPERS =====================
        function resolveApiRequestUrl(endpoint) {
            const base = (typeof API_BASE === "string" && API_BASE.trim() !== "")
                ? API_BASE.trim().replace(/\/$/, "") + "/"
                : null;
            if (base) {
                return new URL(endpoint, base);
            }
            if (window.location.protocol === "file:") {
                return new URL(endpoint, "http://localhost/vitapharm_api/");
            }
            return new URL(endpoint, window.location.href);
        }

        async function api(endpoint, params = {}, method = "GET", body = null) {
            const url = resolveApiRequestUrl(endpoint);
            Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
            const opts = {
                method,
                credentials: "include",
                headers: { "Content-Type": "application/json" }
            };
            if (body) opts.body = JSON.stringify(body);
            const res = await fetch(url.toString(), opts);
            const text = await res.text();
            try {
                return text ? JSON.parse(text) : {};
            } catch (e) {
                const preview = text.replace(/\s+/g, " ").slice(0, 160);
                throw new Error(preview || `HTTP ${res.status}`);
            }
        }

                    const low = products.filter(p => p.stock < 20);
                    labels = low.map(p => getProductName(p));
                    data = low.map(p => p.stock);
                } else {
                    labels = isArabic ? ['يناير', 'فبراير', 'مارس', 'أبريل', 'مايو', 'يونيو'] : ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'];
                    data = profitData;
                }
                currentChart = new Chart(ctx, { type: 'bar', data: { labels, datasets: [{ label: isArabic ? 'القيمة' : 'Value', data, backgroundColor: '#0f6e4a', borderRadius: 8 }] } });
            };
            window.updateAdminChart('profit');

            window.editProduct = (id) => {
                let p = products.find(x => x.id === id);
                let np = prompt(isArabic ? "السعر الجديد:" : "New price:", getProductPrice(p));
                if (np) { if (isArabic) p.priceDZD = parseFloat(np); else p.priceUSD = parseFloat(np); showToast(isArabic ? "تم التحديث" : "Updated"); renderAdminDashboard(); }
            };
            window.deleteProduct = (id) => {
                if (confirm(isArabic ? "حذف المنتج؟" : "Delete product?")) {
                    products = products.filter(p => p.id !== id);
                    showToast(isArabic ? "تم الحذف" : "Deleted");
                    renderAdminDashboard();
                }
            };
        }

        function showAddProductForm() {
            let modal = document.createElement('div');
            modal.className = 'modal';
            modal.innerHTML = `
        <div class="modal-content" style="max-width:500px;">
            <h3 style="color:var(--primary);margin-bottom:1rem;"><i class="fas fa-plus-circle"></i> ${isArabic ? "إضافة منتج" : "Add Product"}</h3>
            <input type="text" id="npAr" placeholder="${isArabic ? "اسم الدواء عربي" : "Arabic Name"}">
            <input type="text" id="npEn" placeholder="${isArabic ? "اسم الدواء إنجليزي" : "English Name"}">
            <select id="npCat">
                ${mainCategories.map(c => `<option value="${c.key}">${isArabic ? c.ar : c.en}</option>`).join('')}
            </select>
            <input type="number" id="npPrice" placeholder="${isArabic ? "السعر (د.ج)" : "Price (DZD)"}">
            <input type="number" id="npPriceUsd" placeholder="${isArabic ? "السعر ($)" : "Price (USD)"}">
            <input type="number" id="npStock" placeholder="${isArabic ? "الكمية" : "Stock"}" value="50">
            <select id="npRx">
                <option value="false">${isArabic ? "بدون وصفة (OTC)" : "Over the Counter (OTC)"}</option>
                <option value="true">${isArabic ? "يستلزم وصفة (Rx)" : "Prescription Required (Rx)"}</option>
            </select>
            <button id="saveNp" style="background:var(--primary);color:white;border:none;padding:12px;border-radius:40px;width:100%;cursor:pointer;font-family:'Cairo',sans-serif;margin-top:8px;">
                <i class="fas fa-save"></i> ${isArabic ? "حفظ" : "Save"}
            </button>
            <button id="cancelNp" style="background:#f0f0f0;border:none;padding:10px;border-radius:40px;width:100%;cursor:pointer;font-family:'Cairo',sans-serif;margin-top:8px;">
                ${isArabic ? "إلغاء" : "Cancel"}
            </button>
        </div>`;
            document.body.appendChild(modal);
            modal.querySelector('#saveNp').onclick = () => {
                const nameAr = modal.querySelector('#npAr').value.trim();
                const nameEn = modal.querySelector('#npEn').value.trim();
                const category = modal.querySelector('#npCat').value;
                const priceDZD = parseFloat(modal.querySelector('#npPrice').value) || 0;
                const priceUSD = parseFloat(modal.querySelector('#npPriceUsd').value) || 0;
                const stock = parseInt(modal.querySelector('#npStock').value) || 50;
                const prescription = modal.querySelector('#npRx').value === 'true';
                if (!nameAr || !nameEn) { showToast(isArabic ? "أدخل اسم الدواء" : "Enter medicine name", "error"); return; }
                products.push({ id: Date.now(), nameAr, nameEn, imageFile: nameEn.toLowerCase().replace(/ /g, '-') + '.jpg', category, priceDZD, priceUSD, stock, imageIcon: "fas fa-capsules", prescription });
                showToast(isArabic ? "تم إضافة المنتج" : "Product added");
                modal.remove();
                renderAdminDashboard();
            };
            modal.querySelector('#cancelNp').onclick = () => modal.remove();
        }

        function renderSuppliers() {
            document.getElementById("mainContent").innerHTML = `
        <button class="back-btn" onclick="currentPage='adminDashboard'; render()"><i class="fas fa-arrow-right"></i> ${isArabic ? "العودة" : "Back"}</button>
        <h2 style="margin-bottom:1rem;"><i class="fas fa-truck"></i> ${isArabic ? "إدارة الموردين" : "Suppliers"}</h2>
        <table class="data-table">
            <thead><tr>
                <th>${isArabic ? "اسم المورد" : "Name"}</th>
                <th>${isArabic ? "البريد" : "Email"}</th>
                <th>${isArabic ? "الهاتف" : "Phone"}</th>
            </tr></thead>
            <tbody id="suppTbody">
                ${suppliers.map(s => `<tr><td>${s.name}</td><td>${s.contact}</td><td>${s.phone}</td></tr>`).join('')}
            </tbody>
        </table>
        <div style="background:white;border-radius:20px;padding:1.5rem;margin-top:1.5rem;border:1px solid var(--border);">
            <h3 style="color:var(--primary);margin-bottom:1rem;">${isArabic ? "إضافة مورد" : "Add Supplier"}</h3>
            <input type="text" id="sName" placeholder="${isArabic ? "اسم المورد" : "Name"}" style="width:100%;padding:12px;border-radius:40px;border:1px solid var(--border);margin-bottom:8px;">
            <input type="text" id="sEmail" placeholder="${isArabic ? "البريد الإلكتروني" : "Email"}" style="width:100%;padding:12px;border-radius:40px;border:1px solid var(--border);margin-bottom:8px;">
            <input type="text" id="sPhone" placeholder="${isArabic ? "الهاتف" : "Phone"}" style="width:100%;padding:12px;border-radius:40px;border:1px solid var(--border);margin-bottom:8px;">
            <button onclick="addSupplierRow()" style="background:linear-gradient(135deg,var(--primary),var(--secondary));color:white;border:none;padding:12px 30px;border-radius:40px;cursor:pointer;font-family:'Cairo',sans-serif;width:100%;">
                <i class="fas fa-plus"></i> ${isArabic ? "إضافة" : "Add"}
            </button>
        </div>`;
            window.addSupplierRow = function () {
                const name = document.getElementById('sName').value.trim();
                const contact = document.getElementById('sEmail').value.trim();
                const phone = document.getElementById('sPhone').value.trim();
                if (!name || !contact || !phone) { showToast(isArabic ? "أدخل جميع البيانات" : "Fill all fields", "error"); return; }
                suppliers.push({ name, contact, phone });
                const row = document.createElement('tr');
                row.innerHTML = `<td>${name}</td><td>${contact}</td><td>${phone}</td>`;
                document.getElementById('suppTbody').appendChild(row);
                document.getElementById('sName').value = '';
                document.getElementById('sEmail').value = '';
                document.getElementById('sPhone').value = '';
                showToast(isArabic ? "تم إضافة المورد" : "Supplier added");
            };
        }

        function renderUsers() {
            document.getElementById("mainContent").innerHTML = `
        <button class="back-btn" onclick="currentPage='adminDashboard'; render()"><i class="fas fa-arrow-right"></i> ${isArabic ? "العودة" : "Back"}</button>
        <h2 style="margin-bottom:1rem;"><i class="fas fa-users"></i> ${isArabic ? "المستخدمون" : "Users"}</h2>
        <div class="stat-card" style="text-align:center;">
            <i class="fas fa-info-circle" style="color:var(--primary);font-size:2rem;"></i>
            <p style="margin-top:0.5rem;">${isArabic ? "بيانات المستخدمين تُدار من قاعدة البيانات مباشرةً عبر phpMyAdmin" : "User data is managed directly from the database via phpMyAdmin"}</p>
            <a href="http://localhost/phpmyadmin" target="_blank" style="color:var(--primary);font-weight:700;">
                <i class="fas fa-external-link-alt"></i> phpMyAdmin
            </a>
        </div>`;
        }

        // ===================== MAIN RENDER =====================
        async function render() {
            normalizePageForRole();
            const role = getSessionRole();
            const nav = document.getElementById("navLinks");
            let items = [];
            if (role === "guest") {
                items = [
                    { id: "home", label: isArabic ? "الرئيسية" : "Home", icon: "fas fa-home" }
                ];
            } else if (role === "client") {
                items = [
                    { id: "home", label: isArabic ? "الرئيسية" : "Home", icon: "fas fa-home" },
                    { id: "cart", label: isArabic ? "السلة" : "Cart", icon: "fas fa-shopping-cart" },
                    { id: "orders", label: isArabic ? "طلباتي" : "Orders", icon: "fas fa-history" },
                    { id: "dashboard", label: isArabic ? "حسابي" : "Dashboard", icon: "fas fa-chart-line" }
                ];
            } else if (role === "staff") {
                items = [
                    { id: "staffDashboard", label: isArabic ? "لوحة الموظف" : "Staff Panel", icon: "fas fa-user-md" },
                    { id: "ordersManage", label: isArabic ? "إدارة الطلبات" : "Orders", icon: "fas fa-truck-fast" }
                ];
            } else {
                items = [
                    { id: "adminDashboard", label: isArabic ? "لوحة المدير" : "Admin", icon: "fas fa-chart-line" },
                    { id: "suppliers", label: isArabic ? "الموردين" : "Suppliers", icon: "fas fa-truck" },
                    { id: "users", label: isArabic ? "المستخدمين" : "Users", icon: "fas fa-users" }
                ];
            }
            nav.innerHTML = items.map(i =>
                `<button class="nav-btn ${currentPage === i.id ? 'active' : ''}" data-page="${i.id}">
            <i class="${i.icon}"></i> ${i.label}
        </button>`
            ).join('');
            document.querySelectorAll(".nav-btn[data-page]").forEach(btn =>
                btn.addEventListener("click", () => { currentPage = btn.dataset.page; render(); })
            );

            document.getElementById("authBtnText").innerText = currentUser
                ? (isArabic ? "تسجيل خروج" : "Logout")
                : (isArabic ? "دخول" : "Login");
            document.getElementById("authBtn").onclick = () => { if (currentUser) logout(); else showAuthModal(); };
            updateRoleUI();

            // Render the appropriate page
            if (role === "guest") {
                renderHomePage();
            } else if (role === "client") {
                if (currentPage === "home") renderHomePage();
                else if (currentPage === "cart") await renderCart();
                else if (currentPage === "orders") await renderOrders();
                else if (currentPage === "dashboard") await renderClientDashboard();
                else renderHomePage();
            } else if (role === "staff") {
                if (currentPage === "staffDashboard") await renderStaffDashboard();
                else if (currentPage === "ordersManage") await renderOrdersManagement();
                else await renderStaffDashboard();
            } else {
                if (currentPage === "adminDashboard") await renderAdminDashboard();
                else if (currentPage === "suppliers") renderSuppliers();
                else if (currentPage === "users") renderUsers();
                else await renderAdminDashboard();
            }
        }

        // ===================== EVENTS =====================
        document.getElementById("langToggle").onclick = () => {
            isArabic = !isArabic;
            document.body.classList.toggle("english", !isArabic);
            document.getElementById("langText").innerText = isArabic ? "العربية" : "English";
            document.documentElement.dir = isArabic ? "rtl" : "ltr";
            render();
        };

        // ===================== INIT =====================
        (async () => {
            await checkSession();
            render();
        })();
    </script>
</body>

</html>
